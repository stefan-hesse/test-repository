name: Build Avatour User Guide

on:
  push:
    branches: [main]
    paths:
      - 'guide-source/**'
  workflow_dispatch:  # allows manual trigger from the GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install markdown pymdown-extensions python-frontmatter

      - name: Build guide outputs
        run: |
          python guide-source/build.py

      - name: Upload built files as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: avatour-guide-${{ github.run_number }}
          path: dist/
          retention-days: 30
