name: Build Avatour Guide
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install markdown pymdown-extensions python-frontmatter anthropic
      - name: Debug env
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "ANTHROPIC_API_KEY is EMPTY"
          else
            echo "ANTHROPIC_API_KEY is SET (length: ${#ANTHROPIC_API_KEY})"
          fi
      - name: Run build (auto-translate + HTML generation)
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
        run: python guide-source/build.py
      - name: Debug guide-source contents
        run: |
          echo "=== guide-source files ==="
          ls -la "guide-source/"
          echo "=== git status ==="
          git status
      - name: Commit updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/
          git add guide-source/
          git diff --cached --quiet || git commit -m "Auto-build: translate + generate HTML [skip ci]"
          git push
      - name: Upload built files as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: avatour-guide-${{ github.run_number }}
          path: dist/
