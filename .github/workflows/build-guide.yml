name: Build Avatour Guide

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install markdown pymdown-extensions python-frontmatter

      - name: Build guide outputs
        run: python guide-source/build.py

      - name: Commit built files to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/
          git diff --staged --quiet || git commit -m "Build: update dist/ [skip ci]"
          git push

      - name: Upload built files as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: avatour-guide-${{ github.run_number }}
          path: dist/
          retention-days: 30
