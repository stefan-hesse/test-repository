name: Translate Web Console UI

# Run manually from the GitHub Actions tab, or automatically
# when en.json is updated on the main branch.
on:
  workflow_dispatch:        # manual trigger
  push:
    branches:
      - main
    paths:
      - 'web-console-ui-translations/en.json'

jobs:
  translate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests openpyxl

      - name: Run translation script
        working-directory: web-console-ui-translations
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
        run: python translate.py

      - name: Commit and push translated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web-console-ui-translations/dist/
          git diff --staged --quiet || git commit -m "chore: update UI translations (IT, DE)"
          git push
